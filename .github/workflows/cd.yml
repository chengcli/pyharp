name: Auto Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  create-tag:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate bump-bot token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BUMP_BOT_APP_ID }}
          private-key: ${{ secrets.BUMP_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Determine next version
        id: next_version
        run: |
          EXISTING_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          if [[ -n "$EXISTING_TAG" ]]; then
            echo "skip_bump=true" >> "$GITHUB_OUTPUT"
            echo "tag=$EXISTING_TAG" >> "$GITHUB_OUTPUT"
            echo "version=${EXISTING_TAG#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))"
          echo "tag=v${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: ${{ steps.next_version.outputs.skip_bump != 'true' }}
        env:
          TAG: ${{ steps.next_version.outputs.tag }}
        run: |
          git config user.name "bump-bot[app]"
          git config user.email "bump-bot[app]@users.noreply.github.com"

          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists on origin; skipping push."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"

      - name: Generate Release Notes
        if: ${{ steps.next_version.outputs.skip_bump != 'true' }}
        id: release_notes
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.next_version.outputs.tag }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const response = await github.request(
              "POST /repos/{owner}/{repo}/releases/generate-notes",
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
              }
            );
            core.setOutput("body", response.data.body || "");

      - name: Post comment on PR with release notes
        if: ${{ steps.next_version.outputs.skip_bump != 'true' }}
        uses: actions/github-script@v7
        env:
          RELEASE_NOTES: ${{ steps.release_notes.outputs.body }}
          RELEASE_TAG: ${{ steps.next_version.outputs.tag }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const notes = process.env.RELEASE_NOTES;
            const tag = process.env.RELEASE_TAG;
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Released ${tag}\n\n${notes}`
            });

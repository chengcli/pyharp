name: Auto Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  create-tag:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate bump-bot token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BUMP_BOT_APP_ID }}
          private-key: ${{ secrets.BUMP_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Determine next version
        id: next_version
        run: |
          EXISTING_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          if [[ -n "$EXISTING_TAG" ]]; then
            echo "skip_bump=true" >> "$GITHUB_OUTPUT"
            echo "tag=$EXISTING_TAG" >> "$GITHUB_OUTPUT"
            echo "version=${EXISTING_TAG#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))"
          echo "tag=v${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update package version
        if: ${{ steps.next_version.outputs.skip_bump != 'true' }}
        env:
          VERSION: ${{ steps.next_version.outputs.version }}
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import os

          path = pathlib.Path("python/__init__.py")
          content = path.read_text()
          updated, count = re.subn(
              r'__version__ = "[^"]+"',
              f'__version__ = "{os.environ["VERSION"]}"',
              content,
              count=1,
          )
          if count != 1:
              raise SystemExit("failed to update python/__init__.py version")
          path.write_text(updated)
          PY

      - name: Commit version bump
        if: ${{ steps.next_version.outputs.skip_bump != 'true' }}
        env:
          VERSION: ${{ steps.next_version.outputs.version }}
        run: |
          git config user.name "bump-bot[app]"
          git config user.email "bump-bot[app]@users.noreply.github.com"
          git add python/__init__.py
          git commit -m "Bump version to v${VERSION}"

      - name: Push version bump commit
        if: ${{ steps.next_version.outputs.skip_bump != 'true' }}
        run: git push origin HEAD:${{ github.event.pull_request.base.ref }}

      - name: Create and push tag
        if: ${{ steps.next_version.outputs.skip_bump != 'true' }}
        env:
          TAG: ${{ steps.next_version.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists on origin; skipping push."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"

      - name: Generate Release Notes
        if: ${{ steps.next_version.outputs.skip_bump != 'true' }}
        uses: octokit/request-action@v2.x
        id: release_notes
        with:
          route: POST /repos/${{ github.repository }}/releases/generate-notes
          tag_name: ${{ steps.next_version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}

      - name: Post comment on PR with release notes
        if: ${{ steps.next_version.outputs.skip_bump != 'true' }}
        uses: actions/github-script@v7
        env:
          RELEASE_NOTES: ${{ fromJson(steps.release_notes.outputs.data).body }}
          RELEASE_TAG: ${{ steps.next_version.outputs.tag }}
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const notes = process.env.RELEASE_NOTES;
            const tag = process.env.RELEASE_TAG;
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Released ${tag}\n\n${notes}`
            });
